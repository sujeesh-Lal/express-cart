syntax = "proto3";

package product;

// ─────────────────────────────────────────────────────────────────────────────
// Product Service
// Provides product data and stock management for Cart and Order services.
// ─────────────────────────────────────────────────────────────────────────────
service ProductService {
  // Get a single product by ID
  rpc GetProduct (GetProductRequest) returns (ProductResponse);

  // Reserve (decrement) stock for multiple items atomically — used at checkout
  rpc ReserveStock (ReserveStockRequest) returns (ReserveStockResponse);

  // Release (restore) stock — compensating call on order failure or cancellation
  rpc ReleaseStock (ReleaseStockRequest) returns (ReleaseStockResponse);

  // Server-streaming: emit a price update whenever a product's price changes
  rpc WatchPrice (WatchPriceRequest) returns (stream PriceUpdate);
}

// ─────────────────────────────────────────────────────────────────────────────
// GetProduct
// ─────────────────────────────────────────────────────────────────────────────
message GetProductRequest {
  string id = 1;
}

message ProductResponse {
  string id          = 1;
  string name        = 2;
  double price       = 3;
  int32  stock       = 4;
  string category    = 5;
  string description = 6;
  bool   found       = 7;   // false when product does not exist
}

// ─────────────────────────────────────────────────────────────────────────────
// ReserveStock
// ─────────────────────────────────────────────────────────────────────────────
message StockItem {
  string id       = 1;
  int32  quantity = 2;
}

message ReserveStockRequest {
  string            order_id = 1;
  repeated StockItem items   = 2;
}

message ReservedItem {
  string id            = 1;
  string name          = 2;
  double price_at_time = 3;
  int32  quantity      = 4;
}

message ReserveStockResponse {
  bool                  success       = 1;
  string                error_message = 2;   // populated on failure
  repeated ReservedItem items         = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// ReleaseStock
// ─────────────────────────────────────────────────────────────────────────────
message ReleaseStockRequest {
  string            order_id = 1;
  repeated StockItem items   = 2;
}

message ReleaseStockResponse {
  bool success = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// WatchPrice  (server-streaming)
// ─────────────────────────────────────────────────────────────────────────────
message WatchPriceRequest {
  string product_id = 1;
}

message PriceUpdate {
  string product_id = 1;
  double old_price  = 2;
  double new_price  = 3;
  string updated_at = 4;
}
